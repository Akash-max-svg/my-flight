<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background: #4338ca;
        }
        .result {
            margin-top: 10px;
            padding: 10px;
            background: #f3f4f6;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
            font-size: 12px;
        }
        .success {
            background: #d1fae5;
            color: #065f46;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
        }
    </style>
</head>
<body>
    <h1>🧪 Authentication Test</h1>
    
    <div class="test-section">
        <h2>User Login</h2>
        <button onclick="testUserLogin()">Test User Login</button>
        <div id="userLoginResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Admin Login</h2>
        <button onclick="testAdminLogin()">Test Admin Login</button>
        <div id="adminLoginResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Password Reset</h2>
        <button onclick="testPasswordReset()">Test Password Reset</button>
        <div id="passwordResetResult" class="result"></div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';

        async function testUserLogin() {
            const resultDiv = document.getElementById('userLoginResult');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/user-auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        password: 'NewTest@123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ SUCCESS\n\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ FAILED\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ ERROR\n\n' + error.message;
            }
        }

        async function testAdminLogin() {
            const resultDiv = document.getElementById('adminLoginResult');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/admin-auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: '7013367409'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ SUCCESS\n\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ FAILED\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ ERROR\n\n' + error.message;
            }
        }

        async function testPasswordReset() {
            const resultDiv = document.getElementById('passwordResetResult');
            resultDiv.textContent = 'Testing...';
            resultDiv.className = 'result';
            
            try {
                const response = await fetch(`${API_URL}/password-reset/reset-password-direct`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'test@example.com',
                        newPassword: 'Test@123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ SUCCESS\n\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ FAILED\n\n' + JSON.stringify(data, null, 2);
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ ERROR\n\n' + error.message;
            }
        }
    </script>
</body>
</html>
